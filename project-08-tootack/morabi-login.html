    <script src="assets/scripts/main.js"></script>
    <script>
        $(document).ready(function () {
            document.querySelectorAll('.ico').forEach((icon) => {
                var movaRate = 45;
                var movementSide = 1;
                if (icon.classList.contains("rate1")) {
                    movaRate = 52;

                } else if (icon.classList.contains("rate2")) {
                    movaRate = 46;
                    movementSide = -1;
                } else if (icon.classList.contains("rate3")) {
                    movaRate = 60;
                }
                var $moveable = $(icon);
                var rectPosY = parseInt($(icon).css('top'), 10);
                var rectPosX = parseInt($(icon).css('right'), 10);
                $("body").mousemove(function (e) {
                    $moveable.css({
                        'top': rectPosY - e.pageY / movaRate * movementSide,
                        'right': rectPosX - e.pageX / movaRate * movementSide
                    });
                });
            })
            $('.testimonial__carousel').flickity({
                wrapAround: true,
                pageDots: true,
                cellAlign: 'center',
                prevNextButtons: false,
                rightToLeft: true,
                imagesLoaded: true,
                groupCells: 1,
                lazyLoad: 3
            });
            servicesSlider();
        });

        function servicesSlider() {
            if (window.innerWidth < 719.98) {

                $('.services__carousel').flickity({
                    wrapAround: true,
                    pageDots: true,
                    cellAlign: 'center',
                    prevNextButtons: true,
                    rightToLeft: true,
                    imagesLoaded: true,
                    groupCells: 1,
                    lazyLoad: 3
                });

            }
        }
    </script>
