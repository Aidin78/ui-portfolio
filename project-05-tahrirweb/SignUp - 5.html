<!DOCTYPE html>
<html lang="fa">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحریر</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/select2.min.css">
    <link rel="stylesheet" href="scss/main.css">
    <link rel="stylesheet" href="scss/signup.css">
</head>

<body dir="rtl">
    <div class="wrapper sign-up-page">
        <header class="logo-header">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-12">
                        <div class="logo-header__logo">
                            <a href="/"><img src="img/logowithtext.png" alt="تحریر"></a>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <div class="sign-up">
                        <div class="sign-up__text text__center o-signupp-differ-mb">
                            ثبت اطلاعات با موفقیت انجام شد .
                            <br>
                            یک نام نمایشی برای خود انتخاب کنید و وارد شوید
                        </div>
                        <div class="sign-up__form">
                            <form action="">
                                <!--Add  error-input to its class for error-->
                                <div class="sign-up__form-row sign-up__simple-input ">
                                    <input class="form-control elem__placeholder-gray " onchange="dataChecker(this)" type="text" name="" id="" placeholder="نام و نام خانوادگی">
                                    <div class="error-text">این بخش اجباری است</div>
                                </div>
                                <div class="sign-up__btn-container flex__center">
                                    <button class="mr-0 ml-0">ورود</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer class="footer">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-6">
                    </div>
                    <div class="col-md-6 col-12">
                        <div class="footer__meta">
                            <div class="footer__version"> نسخه ۲.۱۵</div>
                            <div class="footer__social-media">
                                <ul>
                                    <li><a href=""><i class="niafam niafam-Instagram "></i></a></li>
                                    <li><a href=""><i class="niafam niafam-telegram-logo "></i></a></li>
                                    <li><a href=""><i class="niafam niafam-Union-41 "></i></a></li>
                                </ul>
                            </div>
                            <a href="###" class="footer__app text__blue">tahrir.app</a>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </div>
    <script src="js/jquery-3.5.1.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/select2.min.js"></script>
    <script>
        $("#single").select2({
            placeholder: "کشور",
            "language": {
                "noResults": function () {
                    return "موردی یافت نشد";
                }
            }
        });
        function dataChecker(elem) {
            if (elem.value != '')
                elem.parentElement.classList.remove("error-input");
            else {
                elem.parentElement.classList.add("error-input");
            }
        }
        $(document).ready(function () {
            console.log(document.querySelector('.select2-search__field'))
            $('#single').one('select2:open', function (e) {
                $('input.select2-search__field').prop('placeholder', 'جستجو');
            });
        })
    </script>
</body>

</html>
